<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nommand Vision - Documentação de Sistema</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-tertiary: #1a1a1a;
      --text-primary: #f5f5f5;
      --text-secondary: #a0a0a0;
      --accent: #00d9ff;
      --accent-glow: rgba(0, 217, 255, 0.2);
      --border: #2a2a2a;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Scrollbar custom */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3a3a3a;
    }

    /* Gradientes */
    .gradient-border {
      position: relative;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, var(--accent), #7c3aed, #ec4899);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .glow {
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      overflow-y: auto;
      z-index: 50;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
    }

    .nav-section {
      margin-bottom: 1.5rem;
    }

    .nav-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 4px;
    }

    .nav-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    /* Main content */
    .main-content {
      margin-left: 280px;
      padding: 2rem 3rem;
      min-height: 100vh;
    }

    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-success { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .badge-warning { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .badge-error { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .badge-info { background: rgba(0, 217, 255, 0.15); color: var(--accent); }

    /* Code blocks */
    .code-block {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      overflow-x: auto;
      color: var(--text-primary);
    }

    /* Flow diagram */
    .flow-diagram {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin: 1.5rem 0;
      overflow-x: auto;
    }

    .flow-step {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 8px;
      padding: 8px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
    }

    .flow-arrow {
      color: var(--accent);
      font-weight: bold;
    }

    /* Tables */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .data-table th,
    .data-table td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .data-table th {
      background: var(--bg-tertiary);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
    .data-table tr:hover {
      background: var(--bg-tertiary);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    /* Utility */
    .mb-0 { margin-bottom: 0; }
    .mt-0 { margin-top: 0; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">NV</div>
      <div>
        <h1 class="text-lg font-bold text-white">Nommand Vision</h1>
        <p class="text-sm text-gray-400">Documentação de Sistema</p>
      </div>
    </div>

    <nav>
      <div class="nav-section">
        <div class="nav-title">Visão Geral</div>
        <a href="index.html" class="nav-item active" data-page="overview">
          <i data-lucide="layout-dashboard"></i>
          Overview
        </a>
        <a href="arquitetura.html" class="nav-item" data-page="arquitetura">
          <i data-lucide="box"></i>
          Arquitetura
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-title">Fluxos</div>
        <a href="auth-flow.html" class="nav-item" data-page="auth">
          <i data-lucide="lock"></i>
          Autenticação
        </a>
        <a href="dados-flow.html" class="nav-item" data-page="dados">
          <i data-lucide="database"></i>
          Modelos de Dados
        </a>
        <a href="deploy-flow.html" class="nav-item" data-page="deploy">
          <i data-lucide="rocket"></i>
          Deploy Pipeline
        </a>
        <a href="realtime-flow.html" class="nav-item" data-page="realtime">
          <i data-lucide="radio"></i>
          Tempo Real
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-title">Componentes</div>
        <a href="integracao.html" class="nav-item" data-page="integracao">
          <i data-lucide="plug"></i>
          Integrações
        </a>
        <a href="agentes-ia.html" class="nav-item" data-page="agentes">
          <i data-lucide="bot"></i>
          Agentes IA
        </a>
        <a href="frontend.html" class="nav-item" data-page="frontend">
          <i data-lucide="layout"></i>
          Frontend
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-title">Análise</div>
        <a href="riscos.html" class="nav-item" data-page="riscos">
          <i data-lucide="alert-triangle"></i>
          Riscos
        </a>
        <a href="regras-negocio.html" class="nav-item" data-page="regras">
          <i data-lucide="book-open"></i>
          Regras de Negócio
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-title">Ferramentas</div>
        <a href="storyboard.html" class="nav-item" data-page="storyboard">
          <i data-lucide="git-branch"></i>
          Storyboard Visual
        </a>
      </div>
    </nav>

    <div class="mt-auto pt-4 border-t border-gray-800">
      <p class="text-xs text-gray-500 text-center">
        Versão 1.0.0 | Nommand Vision
      </p>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div id="page-content" class="fade-in">
      <!-- Content loaded dynamically -->
    </div>
  </main>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Simple router
    const pageContent = document.getElementById('page-content');

    async function loadPage(page) {
      try {
        const response = await fetch(page + '.html');
        if (!response.ok) throw new Error('Page not found');
        const html = await response.text();
        pageContent.innerHTML = html;
        lucide.createIcons();
        updateActiveNav(page);
      } catch (error) {
        pageContent.innerHTML = `
          <div class="card">
            <h2 class="text-2xl font-bold mb-4">Página não encontrada</h2>
            <p class="text-gray-400">A página <code>${page}</code> não existe.</p>
          </div>
        `;
      }
    }

    function updateActiveNav(page) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.page === page) {
          item.classList.add('active');
        }
      });
    }

    // Handle navigation clicks
    document.querySelectorAll('.nav-item').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const page = link.dataset.page;
        loadPage(page);
      });
    });

    // Load initial page
    loadPage('overview');
  </script>
</body>
</html>
